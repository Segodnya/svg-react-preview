coverage:
  status:
    project:
      default:
        target: 95%
        threshold: 0.5%
        if_ci_failed: error
    patch:
      default:
        target: 95%
        threshold: 0%
        if_ci_failed: error

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: false

ignore:
  - "tests/**/*"
