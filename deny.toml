# cargo-deny strict configuration. See https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true

[advisories]
version              = 2
db-urls              = ["https://github.com/RustSec/advisory-db"]
yanked               = "deny"
ignore               = []

[bans]
multiple-versions = "deny"
wildcards         = "deny"
highlight         = "all"
allow             = []
deny              = []
# siphasher: pulled at v0.3 by swc_common (via fxhash) and at v1.0 by phf_shared
# (via swc_ecma_ast). Cannot be unified without forking swc; revisit on swc bump.
skip              = [{ crate = "siphasher" }]
skip-tree         = []

[licenses]
version              = 2
confidence-threshold = 0.93
unused-allowed-license = "allow"
allow                = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
]

[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
allow-git        = []
